<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Расписание · Команда Деталей</title>
<style>
:root {
  --bg: #faf8f5; --card: #ffffff; --ink: #2a2a2a; --muted: #8a8580;
  --line: #ece6dd; --accent: #c2845b; --accent-dark: #9c6543;
  --green: #5b8a4e; --yellow: #d4a85c;
  --shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
  background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5;
}

/* ВХОД */
.login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.login-card {
  background: var(--card); padding: 36px 40px; border-radius: 12px;
  box-shadow: var(--shadow); width: 360px; text-align: center;
}
.login-card h1 { margin: 0 0 8px 0; font-size: 22px; font-weight: 600; }
.login-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.login-card input {
  font-family: inherit; font-size: 14px; padding: 10px 12px;
  border: 1px solid var(--line); border-radius: 6px; width: 100%; margin-bottom: 12px;
}
.login-card input:focus { outline: none; border-color: var(--accent); }
.login-card button {
  width: 100%; padding: 10px; background: var(--accent); color: white;
  border: none; border-radius: 6px; font-size: 14px; cursor: pointer;
  font-family: inherit; font-weight: 500;
}
.login-card .err { color: #c45a5a; font-size: 12px; margin-top: 8px; min-height: 16px; }

/* ОСНОВА */
.app { display: none; }
.app.show { display: block; }
header {
  background: white; border-bottom: 1px solid var(--line);
  padding: 14px 20px; position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
header h1 { margin: 0; font-size: 18px; font-weight: 600; }
header h1 em { color: var(--accent); font-style: normal; }
header .badge { background: var(--bg); color: var(--muted); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
header .spacer { flex: 1; }
.month-nav {
  display: flex; align-items: center; gap: 6px;
}
.month-nav button {
  border: 1px solid var(--line); background: white; padding: 5px 10px;
  border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 13px;
}
.month-nav button:hover { background: var(--bg); border-color: var(--accent); }
.month-nav h2 {
  margin: 0 8px; font-size: 15px; font-weight: 600; text-transform: capitalize;
  min-width: 130px; text-align: center;
}

main { max-width: 1200px; margin: 0 auto; padding: 16px 20px; }

.legend {
  display: flex; gap: 18px; margin-bottom: 12px; padding: 10px 14px;
  background: white; border: 1px solid var(--line); border-radius: 8px;
  font-size: 13px; flex-wrap: wrap;
}
.legend > div { display: flex; align-items: center; gap: 8px; color: var(--ink); font-weight: 500; }
.legend .sw {
  display: inline-block; width: 22px; height: 16px; border-radius: 3px; border-left: 4px solid;
}
.legend .sw.published { background: white; border-color: var(--accent); border: 1px solid var(--line); border-left: 4px solid var(--accent); }
.legend .sw.draft { background: #fafafa; border-color: var(--accent); border-left-style: dashed; opacity: .85; }
.legend .sw.modified { background: #fde6ec; border-color: #d6557a; border: 1px solid #d6557a; border-left: 4px solid #d6557a; }

.calendar {
  background: white; border: 1px solid var(--line);
  border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);
}
.weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: var(--bg); border-bottom: 1px solid var(--line);
}
.weekdays > div {
  padding: 8px 12px; font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
}
.weekdays > div.weekend { color: var(--accent); background: #fdf3e9; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); }
.day {
  min-height: 110px; padding: 6px;
  border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
  min-width: 0;     /* чтобы grid-ячейки не раздувались от длинного контента */
  overflow: hidden;
}
.day:nth-child(7n) { border-right: none; }
.day.other-month { background: #fafafa; opacity: .35; }
.day.weekend { background: #fdf3e9; }
.day.weekend .day-num { color: var(--accent); }
.day.today { background: #fdf6e8; }
.day.today .day-num { background: var(--accent); color: white; }
.day-num {
  display: inline-block; min-width: 22px; height: 22px; line-height: 22px;
  text-align: center; font-size: 12px; font-weight: 600; border-radius: 50%; margin-bottom: 4px;
}

/* Переключатель Месяц / Неделя */
.view-mode {
  display: flex; gap: 0; border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
  margin-right: 12px;
}
.mode-btn {
  background: white; border: none; padding: 6px 14px; font-size: 12px;
  cursor: pointer; color: var(--ink); transition: all .12s;
}
.mode-btn:hover { background: #fafafa; }
.mode-btn.active { background: var(--accent); color: white; }

/* Недельный режим: дни шире */
.calendar.week-mode .day { min-height: 360px; }
.calendar.week-mode .day .event-pill { font-size: 12px; padding: 6px 9px; }

/* ================ ТАБЛИЦА ================ */
.events-table {
  width: 100%;
  background: white;
  border-radius: 10px;
  border: 1px solid var(--line);
  overflow: hidden;
  border-collapse: collapse;
}
.events-table thead { background: #f5efe5; border-bottom: 2px solid var(--line); }
.events-table th {
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.events-table th.right { text-align: right; }
.events-table th.col-thumb { width: 72px; padding-left: 14px; padding-right: 0; }
.events-table .col-thumb-cell {
  padding-left: 14px;
  padding-right: 0;
  width: 72px;
}
.events-table .col-thumb-cell .thumb {
  width: 56px;
  height: 56px;
  border-radius: 8px;
  background-size: cover;
  background-position: center;
  background-color: #f5efe5;
}
.events-table .col-thumb-cell .thumb.empty { background: transparent; }
.events-table tbody tr {
  border-bottom: 1px solid var(--line);
  cursor: pointer;
}
.events-table tbody tr:last-child { border-bottom: none; }
.events-table tbody tr:hover { background: #fafafa; }
.events-table tbody tr.weekend { background: #fdf3e9; }
.events-table tbody tr.weekend:hover { background: #f7e5d3; }
.events-table tbody tr.draft { opacity: .78; }
.events-table tbody tr.modified { background: #fde6ec; }
.events-table tbody tr.modified:hover { background: #fad5df; }
.events-table td {
  padding: 12px 14px;
  font-size: 13px;
  vertical-align: middle;
}
.events-table .col-date { white-space: nowrap; font-weight: 600; }
.events-table .col-date .wd { font-size: 11px; color: var(--muted); margin-left: 4px; }
.events-table .col-time { white-space: nowrap; color: var(--accent); font-weight: 600; }
.events-table .col-format {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .4px;
  font-weight: 600;
  margin-bottom: 2px;
}
.events-table .col-name { font-weight: 600; }
.events-table .col-status {
  font-size: 11px;
  text-align: right;
  white-space: nowrap;
}
.events-table .col-status .sw {
  display: inline-block;
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}
.events-table .col-status .sw.published { background: #5b8a4e; }
.events-table .col-status .sw.draft { background: var(--muted); }
.events-table .col-status .sw.modified { background: #d6557a; }
.events-table .col-price {
  text-align: right;
  white-space: nowrap;
  color: var(--accent-dark);
  font-weight: 700;
}
.events-table .col-price .em { color: var(--muted); font-weight: 400; font-style: italic; }
.event-pill {
  display: block; border-left: 3px solid var(--accent); background: #fdf3e9;
  padding: 4px 7px; border-radius: 4px; font-size: 11px; margin-bottom: 3px;
  cursor: pointer; transition: all .15s;
  white-space: normal; line-height: 1.35;
  /* перенос только между словами; длинные слова не режем по слогам */
  word-break: normal;
  overflow-wrap: break-word;
  hyphens: none;
}
.event-pill:hover { background: white; box-shadow: 0 0 0 1px var(--accent); }
.event-pill.draft     { opacity: 0.78; border-left-style: dashed; }
.event-pill.modified  { background: #fde6ec; box-shadow: inset 0 0 0 2px #d6557a; }
.event-pill .time { color: var(--muted); margin-right: 4px; font-weight: 500; }
.event-pill .name { font-weight: 500; }
.event-pill.cat-mk      { border-left-color: #c2845b; }
.event-pill.cat-kino    { border-left-color: #5b7a9a; background: #eef2f7; }
.event-pill.cat-book    { border-left-color: #5b8a4e; background: #eef5ec; }
.event-pill.cat-party   { border-left-color: #b15a8a; background: #f9eaf2; }
.event-pill.cat-private { border-left-color: #d4a85c; background: #fdf6e8; }
.event-pill.cat-expert  { border-left-color: #7a5b9a; background: #f1edf7; }

.empty {
  padding: 80px 20px; text-align: center; color: var(--muted); font-size: 14px;
  grid-column: 1 / -1;
}
.empty .big { font-size: 40px; margin-bottom: 8px; opacity: 0.4; }

/* МОДАЛКА */
.modal-bg {
  position: fixed; inset: 0; background: rgba(40,30,20,.55);
  display: none; align-items: flex-start; justify-content: center;
  padding: 30px 16px; z-index: 100; overflow-y: auto;
}
.modal-bg.show { display: flex; }
.modal {
  background: white; border-radius: 14px; width: 100%; max-width: 600px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden;
}
.modal-banner {
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  color: white; padding: 18px 22px; position: relative;
}
.modal-banner.draft { background: linear-gradient(135deg, #888, #555); }
.modal-banner.modified { background: linear-gradient(135deg, var(--yellow), #b08840); }
.modal-banner .top {
  display: flex; gap: 8px; margin-bottom: 8px;
}
.modal-banner .pill {
  background: rgba(255,255,255,.22); padding: 3px 9px; border-radius: 12px;
  font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .3px;
}
.modal-banner h2 { margin: 0 0 6px 0; font-size: 22px; font-weight: 600; line-height: 1.25; }
.modal-banner .when { font-size: 14px; opacity: .9; }
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(0,0,0,.15); border: none; color: white;
  width: 30px; height: 30px; border-radius: 50%;
  font-size: 16px; cursor: pointer; line-height: 1;
}
.modal-close:hover { background: rgba(0,0,0,.3); }
.modal-body { padding: 18px 22px; max-height: 55vh; overflow-y: auto; }
.detail-row { display: flex; gap: 10px; padding: 6px 0; font-size: 13px; }
.detail-row .lbl { width: 110px; color: var(--muted); font-size: 12px; flex-shrink: 0; }
.detail-row .val { flex: 1; }
.descr {
  margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line);
  font-size: 13px; white-space: pre-line; line-height: 1.6; color: #444;
}
.descr.empty-descr { color: var(--muted); font-style: italic; }

/* Комментарий команде — выделенный блок */
.team-comment-box {
  margin-top: 14px;
  background: #fdf6e8;
  border-left: 3px solid var(--yellow);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 13px;
  line-height: 1.55;
  white-space: pre-line;
  color: #4a3f20;
}
.team-comment-box::before {
  content: '💬 Команде:';
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--yellow);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 4px;
}

/* Референсы */
.team-refs {
  margin-top: 14px;
}
.team-refs-head {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .4px;
  font-weight: 600;
  margin-bottom: 8px;
}
.team-refs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 8px;
}
.team-ref-card {
  display: block;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: white;
  overflow: hidden;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  transition: all .12s;
}
.team-ref-card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.team-ref-card .thumb {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--bg) center/cover no-repeat;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: var(--muted);
}
.team-ref-card .meta {
  padding: 5px 7px;
  font-size: 10px;
  line-height: 1.3;
}
.team-ref-card .meta .domain { color: var(--muted); }
.team-ref-card .meta .note {
  margin-top: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.modal-foot {
  padding: 12px 22px; border-top: 1px solid var(--line);
  background: var(--bg); display: flex; justify-content: flex-end; gap: 8px;
}
.btn {
  background: white; color: var(--ink); border: 1px solid var(--line);
  padding: 9px 14px; font-size: 13px; border-radius: 6px;
  cursor: pointer; font-family: inherit;
}
.btn:hover { background: var(--bg); }
.btn.copy { background: var(--accent); color: white; border-color: var(--accent); }
.btn.copy:hover { background: var(--accent-dark); }

@media (max-width: 700px) {
  .day { min-height: 80px; padding: 3px; }
  .event-pill { font-size: 10px; padding: 3px 5px; }
  .event-pill .time { margin-right: 2px; }
  header h1 { font-size: 16px; }

  /* Таблица на мобиле */
  .events-table th, .events-table td { padding: 8px 6px; font-size: 12px; }
  .events-table th.col-thumb { padding-left: 10px; padding-right: 0; width: 56px; }
  .events-table .col-thumb-cell { padding-left: 10px; padding-right: 0; width: 56px; }
  .events-table .col-thumb-cell .thumb { width: 44px; height: 44px; border-radius: 6px; }
  .events-table .col-format { font-size: 10px; }
  .events-table .col-name { font-size: 12px; }
  .events-table .col-date { font-size: 12px; }
  .events-table .col-date .wd { font-size: 10px; margin-left: 0; display: block; }
  /* Скрываем педагога и статус (статус всё равно виден через цвет строки .modified) */
  .events-table th:nth-child(5),
  .events-table td:nth-child(5),
  .events-table th.col-status,
  .events-table .col-status { display: none; }

  /* Неделя на мобиле — переключиться на месяц физически нельзя в коде,
     но если кто-то всё же откроет: дни уменьшим */
  .calendar.week-mode .day { min-height: 200px; }
  .calendar.week-mode .event-pill { font-size: 10px; padding: 3px 5px; }

  /* Кнопки переключателя режимов компактнее */
  .view-mode .mode-btn { padding: 6px 10px; font-size: 11px; }
}
</style>
</head>
<body>

<!-- Логин -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Команда Деталей</h1>
    <div class="sub">Расписание для маркетологов и SMM</div>
    <input type="password" id="loginPwd" placeholder="Пароль" autofocus>
    <button onclick="tryLogin()">Войти</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div class="app" id="app">
  <header>
    <h1>Пространство <em>Детали</em></h1>
    <span class="badge">только просмотр</span>
    <div class="spacer"></div>
    <div class="view-mode">
      <button id="modeMonthBtn" class="mode-btn active" onclick="setViewMode('month')">Месяц</button>
      <button id="modeWeekBtn" class="mode-btn" onclick="setViewMode('week')">Неделя</button>
      <button id="modeTableBtn" class="mode-btn" onclick="setViewMode('table')">Таблица</button>
    </div>
    <div class="month-nav">
      <button onclick="prevPeriod()">‹</button>
      <h2 id="monthTitle">—</h2>
      <button onclick="nextPeriod()">›</button>
    </div>
  </header>

  <main>
    <div class="legend">
      <div><span class="sw published"></span> Опубликовано</div>
      <div><span class="sw draft"></span> Черновик</div>
      <div><span class="sw modified"></span> Есть изменения, не отправленные в Альфу</div>
      <div style="margin-left:auto; font-size: 11px;">Клик по событию — детали и описание</div>
    </div>
    <div class="calendar">
      <div class="weekdays" id="weekdays"></div>
      <div class="days" id="daysGrid"><div class="empty"><div class="big">📅</div>Загрузка…</div></div>
    </div>
    <div id="tableView" style="display:none; overflow-x:auto;"></div>
  </main>
</div>

<div class="modal-bg" id="evModal">
  <div class="modal">
    <div class="modal-banner" id="mBanner">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="top">
        <div class="pill" id="mFormat">—</div>
        <div class="pill" id="mStatus">—</div>
      </div>
      <h2 id="mName">—</h2>
      <div class="when" id="mWhen">—</div>
    </div>
    <div class="modal-body">
      <div id="mDetails"></div>
      <div class="descr" id="mDescr"></div>
      <div class="team-comment-box" id="mTeamComment" style="display:none"></div>
      <div class="team-refs" id="mRefsBlock" style="display:none">
        <div class="team-refs-head">📌 Референсы</div>
        <div class="team-refs-grid" id="mRefsGrid"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Закрыть</button>
      <button class="btn copy" onclick="copyDescription()">📋 Скопировать описание</button>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHrfjsxMyN2TGfAw-JH8MN0KW8QdUUy-bIQSlgjtEIciAw_FnbrL8ay5CrEcqrcQrF/exec';
const PROJECT = 'details';
const PASSWORD = '19082026team';

const MONTH_NAMES = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const WEEKDAY_SHORT = ['пн','вт','ср','чт','пт','сб','вс'];
const WEEKDAY_LONG = ['понедельник','вторник','среда','четверг','пятница','суббота','воскресенье'];

// На мобиле сразу открываем «Таблица» — на узком экране сетка нечитаемая
const _isMobile = (typeof window !== 'undefined' && window.matchMedia &&
                   window.matchMedia('(max-width: 700px)').matches);
const state = { curMonth: new Date(), curWeekStart: null,
                viewMode: _isMobile ? 'table' : 'month',
                events: [], currentEvent: null };

// === Login ===
function tryLogin() {
  const pwd = document.getElementById('loginPwd').value;
  if (pwd !== PASSWORD) {
    document.getElementById('loginErr').textContent = 'Неверный пароль';
    return;
  }
  localStorage.setItem('detali_team_pwd', pwd);
  showApp();
}
(function autoLogin() {
  const pwd = localStorage.getItem('detali_team_pwd');
  if (pwd === PASSWORD) showApp();
  document.getElementById('loginPwd').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
})();
function showApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  // Синхронизируем активную кнопку переключателя со state.viewMode
  // (на мобиле дефолт 'table', не 'month')
  const btnIds = { month: 'modeMonthBtn', week: 'modeWeekBtn', table: 'modeTableBtn' };
  Object.entries(btnIds).forEach(([mode, id]) => {
    const b = document.getElementById(id);
    if (b) b.classList.toggle('active', state.viewMode === mode);
  });
  loadEvents();
}

// === Утилиты ===
function ymd(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function categoryClass(fmt) {
  if (!fmt) return '';
  if (fmt.toLowerCase().startsWith('мк')) return 'cat-mk';
  if (fmt === 'Киновечер') return 'cat-kino';
  if (fmt === 'Книжный клуб') return 'cat-book';
  if (fmt === 'Вечеринка' || fmt === 'Дегустация') return 'cat-party';
  if (fmt === 'День рождения' || fmt === 'Свидание') return 'cat-private';
  if (fmt === 'Встреча с экспертом') return 'cat-expert';
  return '';
}

async function loadEvents() {
  try {
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', 'teamEvents');
    url.searchParams.set('project', PROJECT);
    const r = await fetch(url.toString()).then(x => x.json());
    if (!r.ok) {
      document.getElementById('daysGrid').innerHTML = '<div class="empty"><div class="big">😕</div>' + escapeHtml(r.error || 'Ошибка загрузки') + '</div>';
      return;
    }
    state.events = r.events || [];
    if (state.events.length > 0) {
      const today = ymd(new Date());
      const future = state.events.filter(e => e.date >= today);
      const first = future.length ? future[0] : state.events[0];
      const [y, m] = first.date.split('-').map(Number);
      state.curMonth = new Date(y, m - 1, 1);
    }
    renderCalendar();
  } catch(e) {
    document.getElementById('daysGrid').innerHTML = '<div class="empty"><div class="big">😕</div>Не удалось связаться с сервером</div>';
  }
}

function renderCalendar() {
  const cal = document.querySelector('.calendar');
  const tableWrap = document.getElementById('tableView');

  if (state.viewMode === 'table') {
    if (cal) cal.style.display = 'none';
    if (tableWrap) tableWrap.style.display = 'block';
    renderTable();
    return;
  }
  // Календарные режимы
  if (cal) cal.style.display = '';
  if (tableWrap) tableWrap.style.display = 'none';

  if (state.viewMode === 'week') {
    cal.classList.add('week-mode');
    renderWeek();
  } else {
    cal.classList.remove('week-mode');
    renderMonth();
  }
}

function startOfWeek_(d) {
  const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const wd = (x.getDay() + 6) % 7; // 0=пн ... 6=вс
  x.setDate(x.getDate() - wd);
  return x;
}

function setViewMode(mode) {
  state.viewMode = mode;
  document.getElementById('modeMonthBtn').classList.toggle('active', mode === 'month');
  document.getElementById('modeWeekBtn').classList.toggle('active', mode === 'week');
  document.getElementById('modeTableBtn').classList.toggle('active', mode === 'table');
  if (mode === 'week' && !state.curWeekStart) {
    state.curWeekStart = startOfWeek_(new Date());
  }
  renderCalendar();
}

function renderWeek() {
  const ws = state.curWeekStart || startOfWeek_(new Date());
  const we = new Date(ws); we.setDate(ws.getDate() + 6);
  document.getElementById('monthTitle').textContent =
    ws.getDate() + ' ' + MONTH_NAMES[ws.getMonth()] + ' — ' +
    we.getDate() + ' ' + MONTH_NAMES[we.getMonth()] + ' ' + we.getFullYear();

  const wd = document.getElementById('weekdays');
  wd.innerHTML = WEEKDAY_SHORT.map((d, i) => `<div class="${i >= 5 ? 'weekend' : ''}">${d}</div>`).join('');

  const grid = document.getElementById('daysGrid');
  const today = new Date(); today.setHours(0,0,0,0);
  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws);
    d.setDate(ws.getDate() + i);
    const dStr = ymd(d);
    const isToday = d.getTime() === today.getTime();
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const dayEvents = state.events.filter(e => e.date === dStr && e.status !== 'archived');
    dayEvents.sort((a, b) => (a.timeStart || '99').localeCompare(b.timeStart || '99'));
    const eventsHtml = dayEvents.map(ev => {
      const st = ev.status || 'draft';
      return `
        <div class="event-pill ${categoryClass(ev.format)} ${st}" onclick="openEvent('${ev.id}')">
          <span class="time">${escapeHtml(ev.timeStart || '')}</span><span class="name">${escapeHtml([ev.format, ev.name].filter(Boolean).join(' · ') || '?')}</span>
        </div>
      `;
    }).join('');
    html += `
      <div class="day ${isWe ? 'weekend' : ''} ${isToday ? 'today' : ''}">
        <span class="day-num">${d.getDate()}</span>
        ${eventsHtml}
      </div>
    `;
  }
  grid.innerHTML = html;
}

function renderMonth() {
  const m = state.curMonth.getMonth();
  const y = state.curMonth.getFullYear();
  document.getElementById('monthTitle').textContent = MONTH_NAMES[m] + ' ' + y;

  const wd = document.getElementById('weekdays');
  wd.innerHTML = WEEKDAY_SHORT.map((d, i) => `<div class="${i >= 5 ? 'weekend' : ''}">${d}</div>`).join('');

  const first = new Date(y, m, 1);
  const startWd = (first.getDay() + 6) % 7;
  const start = new Date(y, m, 1 - startWd);
  const grid = document.getElementById('daysGrid');
  let html = '';
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dStr = ymd(d);
    const inMonth = d.getMonth() === m;
    const isToday = d.getTime() === today.getTime();
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const dayEvents = state.events.filter(e => e.date === dStr && e.status !== 'archived');
    dayEvents.sort((a, b) => (a.timeStart || '99').localeCompare(b.timeStart || '99'));
    const eventsHtml = dayEvents.map(ev => {
      const st = ev.status || 'draft';
      return `
        <div class="event-pill ${categoryClass(ev.format)} ${st}" onclick="openEvent('${ev.id}')">
          <span class="time">${escapeHtml(ev.timeStart || '')}</span><span class="name">${escapeHtml([ev.format, ev.name].filter(Boolean).join(' · ') || '?')}</span>
        </div>
      `;
    }).join('');
    html += `
      <div class="day ${inMonth ? '' : 'other-month'} ${isWe ? 'weekend' : ''} ${isToday ? 'today' : ''}">
        <span class="day-num">${d.getDate()}</span>
        ${eventsHtml}
      </div>
    `;
  }
  grid.innerHTML = html;
}

// === ТАБЛИЦА (для команды/маркетологов) ===
function renderTable() {
  const m = state.curMonth.getMonth();
  const y = state.curMonth.getFullYear();
  document.getElementById('monthTitle').textContent = MONTH_NAMES[m] + ' ' + y;

  const monthEvents = state.events.filter(e => {
    if (!e.date) return false;
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  }).slice().sort((a, b) =>
    (a.date + (a.timeStart || '99')).localeCompare(b.date + (b.timeStart || '99'))
  );

  const container = document.getElementById('tableView');
  if (monthEvents.length === 0) {
    container.innerHTML = '<div class="empty" style="padding:60px 20px; text-align:center; color:var(--muted);"><div class="big" style="font-size:40px; opacity:.4;">📅</div>В этом месяце событий нет</div>';
    return;
  }

  const todayStr = ymd(new Date());
  const statusLabel = { published: 'В Альфе', modified: 'К синку', draft: 'Черновик', archived: 'Архив' };

  const rows = monthEvents.map(ev => {
    const d = new Date(ev.date);
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const isToday = ev.date === todayStr;
    const wdShort = WEEKDAY_SHORT[(wkd + 6) % 7];
    const st = ev.status || 'draft';

    const cls = [st];
    if (isWe) cls.push('weekend');
    if (isToday) cls.push('today');

    const priceHtml = ev.price ? (ev.price + ' р') : '<span class="em">—</span>';
    const refs = (ev.references || []).filter(r => r && r.thumb);
    const thumbHtml = refs.length > 0
      ? `<div class="thumb" style="background-image: url('${refs[0].thumb.replace(/'/g, "%27")}')"></div>`
      : `<div class="thumb empty"></div>`;

    return `
      <tr class="${cls.join(' ')}" onclick="openEvent('${ev.id}')">
        <td class="col-thumb-cell">${thumbHtml}</td>
        <td class="col-date">${d.getDate()} ${MONTH_NAMES[m].slice(0,3)}<span class="wd">${wdShort}</span></td>
        <td class="col-time">${escapeHtml(ev.timeStart || '—')}</td>
        <td>
          <div class="col-format">${escapeHtml(ev.format || '')}</div>
          <div class="col-name">${escapeHtml(ev.name || '')}</div>
        </td>
        <td>${escapeHtml(ev.teacher || '')}</td>
        <td class="col-price">${priceHtml}</td>
        <td class="col-status"><span class="sw ${st}"></span>${statusLabel[st] || st}</td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <table class="events-table">
      <thead>
        <tr>
          <th class="col-thumb"></th>
          <th>Дата</th>
          <th>Время</th>
          <th>Событие</th>
          <th>Педагог</th>
          <th class="right">Цена</th>
          <th class="right col-status">Статус</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function prevPeriod() {
  if (state.viewMode === 'week') {
    const ws = state.curWeekStart || startOfWeek_(new Date());
    const nw = new Date(ws); nw.setDate(ws.getDate() - 7);
    state.curWeekStart = nw;
  } else {
    state.curMonth = new Date(state.curMonth.getFullYear(), state.curMonth.getMonth() - 1, 1);
  }
  renderCalendar();
}
function nextPeriod() {
  if (state.viewMode === 'week') {
    const ws = state.curWeekStart || startOfWeek_(new Date());
    const nw = new Date(ws); nw.setDate(ws.getDate() + 7);
    state.curWeekStart = nw;
  } else {
    state.curMonth = new Date(state.curMonth.getFullYear(), state.curMonth.getMonth() + 1, 1);
  }
  renderCalendar();
}
// Сохраняем старые имена для обратной совместимости (если где-то onclick остался)
function prevMonth() { prevPeriod(); }
function nextMonth() { nextPeriod(); }

function openEvent(id) {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  state.currentEvent = ev;
  const dt = new Date(ev.date);
  const wd = WEEKDAY_LONG[(dt.getDay() + 6) % 7];
  const banner = document.getElementById('mBanner');
  banner.classList.remove('draft', 'modified');
  const st = ev.status || 'draft';
  if (st !== 'published') banner.classList.add(st);

  const stLabel = st === 'published' ? '✓ Опубликовано'
    : st === 'modified' ? '⏳ Есть изменения'
    : '◌ Черновик';

  document.getElementById('mFormat').textContent = ev.format || '';
  document.getElementById('mStatus').textContent = stLabel;
  document.getElementById('mName').textContent = ev.name || ev.format || '';
  document.getElementById('mWhen').textContent = `${dt.getDate()} ${MONTH_NAMES[dt.getMonth()]}, ${wd}, в ${ev.timeStart || '—'}`;

  const details = [];
  if (ev.duration) details.push(`<div class="detail-row"><div class="lbl">Длительность</div><div class="val">${ev.duration} ч</div></div>`);
  if (ev.teacher) details.push(`<div class="detail-row"><div class="lbl">Ведущий</div><div class="val">${escapeHtml(ev.teacher)}</div></div>`);
  if (ev.price) details.push(`<div class="detail-row"><div class="lbl">Цена</div><div class="val">${ev.price} руб</div></div>`);
  if (ev.limit) details.push(`<div class="detail-row"><div class="lbl">Лимит</div><div class="val">до ${ev.limit} чел</div></div>`);
  if (ev.alfaGroupId) details.push(`<div class="detail-row"><div class="lbl">ID в Альфе</div><div class="val">${ev.alfaGroupId}</div></div>`);
  document.getElementById('mDetails').innerHTML = details.join('');

  const descrEl = document.getElementById('mDescr');
  if (ev.description) {
    descrEl.classList.remove('empty-descr');
    descrEl.textContent = ev.description;
  } else {
    descrEl.classList.add('empty-descr');
    descrEl.textContent = '— описание ещё не подготовлено —';
  }

  // Комментарий команде
  const tcEl = document.getElementById('mTeamComment');
  if (ev.teamComment && String(ev.teamComment).trim()) {
    tcEl.textContent = String(ev.teamComment).trim();
    tcEl.style.display = 'block';
  } else {
    tcEl.style.display = 'none';
    tcEl.textContent = '';
  }

  // Референсы
  const refsBlock = document.getElementById('mRefsBlock');
  const refsGrid = document.getElementById('mRefsGrid');
  const refs = (ev.references || []).filter(r => r && r.url);
  if (refs.length > 0) {
    refsGrid.innerHTML = refs.map(r => {
      const url = String(r.url);
      const note = String(r.note || '').trim();
      const thumb = String(r.thumb || '').trim();
      let domain = String(r.domain || '').trim();
      if (!domain) {
        try { domain = new URL(url).hostname.replace(/^www\./, ''); } catch(e) {}
      }
      const fallback = 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(domain || url) + '&sz=128';
      const thumbStyle = thumb
        ? `background-image: url('${escapeHtml(thumb)}')`
        : `background-image: url('${escapeHtml(fallback)}'); background-size: 48px 48px;`;
      return `
        <a class="team-ref-card" href="${escapeHtml(url)}" target="_blank" rel="noopener" title="${escapeHtml(url)}">
          <div class="thumb" style="${thumbStyle}"></div>
          <div class="meta">
            <div class="domain">${escapeHtml(domain || 'ссылка')}</div>
            ${note ? `<div class="note">${escapeHtml(note)}</div>` : ''}
          </div>
        </a>
      `;
    }).join('');
    refsBlock.style.display = 'block';
  } else {
    refsBlock.style.display = 'none';
    refsGrid.innerHTML = '';
  }

  document.getElementById('evModal').classList.add('show');
}

function closeModal() {
  document.getElementById('evModal').classList.remove('show');
}

function copyDescription() {
  const ev = state.currentEvent;
  if (!ev) return;
  const dt = new Date(ev.date);
  const wd = WEEKDAY_LONG[(dt.getDay() + 6) % 7];
  const lines = [
    ev.name || ev.format,
    `${dt.getDate()} ${MONTH_NAMES[dt.getMonth()]}, ${wd}, ${ev.timeStart || ''}`,
    ev.price ? ev.price + ' руб' : '',
    '',
    ev.description || ''
  ].filter(Boolean);
  // Комментарий команде
  const tc = (ev.teamComment || '').trim();
  if (tc) {
    lines.push('');
    lines.push('💬 Команде: ' + tc);
  }
  // Референсы
  const refs = (ev.references || []).filter(r => r && r.url);
  if (refs.length > 0) {
    lines.push('');
    lines.push('📌 Референсы:');
    refs.forEach(r => {
      const url = String(r.url);
      const note = String(r.note || '').trim();
      lines.push(note ? `• ${url} — ${note}` : `• ${url}`);
    });
  }
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target.closest('button');
    const orig = btn.textContent;
    btn.textContent = '✓ Скопировано';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}

document.getElementById('evModal').addEventListener('click', e => {
  if (e.target.id === 'evModal') closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
