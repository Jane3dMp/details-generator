<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Расписание · Детали</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Onest:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
:root {
  /* === ФИРМЕННЫЕ ЦВЕТА «ДЕТАЛИ» === */
  --terracotta: #C06D54;
  --terracotta-dark: #a35946;
  --amber: #EF9F27;
  --amber-dark: #d18510;
  --milk: #F5EFE6;
  --dark: #3D2B1F;
  --olive: #6B7A4A;
  --olive-light: #8FA370;

  /* Алиасы для совместимости со старой схемой */
  --bg: #F5EFE6;
  --card: #ffffff;
  --ink: #3D2B1F;
  --muted: #8a7d6e;
  --line: #e8dfd1;
  --accent: #C06D54;
  --accent-dark: #a35946;
  --green: #6B7A4A;
  --shadow: 0 1px 3px rgba(61,43,31,.04), 0 4px 12px rgba(61,43,31,.06);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: 'Onest', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
}

/* ================ ШАПКА ================ */
header {
  background: white;
  border-bottom: 1px solid var(--line);
  padding: 22px 20px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 5;
}
header h1 {
  margin: 0; font-weight: 700;
  font-family: 'Manrope', sans-serif;
  line-height: 1.05; letter-spacing: -.5px;
}
header h1 .small {
  font-size: 13px; color: var(--muted); display: block;
  font-family: 'Onest', sans-serif; font-weight: 500;
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;
}
header h1 em {
  color: var(--terracotta); font-style: italic; font-weight: 500;
  font-size: 44px; letter-spacing: -.5px;
  font-family: 'Cormorant Garamond', Georgia, serif;
  line-height: 1;
}
header .sub { color: var(--muted); font-size: 12px; margin-top: 6px; letter-spacing: .3px; }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
.month-nav button {
  border: 1px solid var(--line); background: white; padding: 6px 14px;
  border-radius: 8px; cursor: pointer; font-family: 'Onest', sans-serif; font-size: 14px; color: var(--ink);
  transition: all .15s; font-weight: 500;
  -webkit-appearance: none;
  appearance: none;
}
.month-nav button:hover, .month-nav button:active { background: var(--bg); border-color: var(--terracotta); color: var(--terracotta); }
.month-nav h2 {
  margin: 0 12px; font-size: 18px; font-weight: 600; text-transform: capitalize;
  min-width: 160px; text-align: center;
  font-family: 'Manrope', sans-serif; letter-spacing: -.3px;
}

main { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* ================ КАЛЕНДАРНАЯ СЕТКА (десктоп) ================ */
.calendar {
  background: white; border: 1px solid var(--line);
  border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);
}
.weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: var(--bg); border-bottom: 1px solid var(--line);
}
.weekdays > div {
  padding: 8px 12px; font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
}
.weekdays > div.weekend { color: var(--terracotta); background: #efe5d3; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); }
.day {
  min-height: 110px; padding: 6px;
  border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
  position: relative;
  min-width: 0;
  overflow: hidden;
}
.day:nth-child(7n) { border-right: none; }
.day.other-month { background: #fafafa; opacity: .35; }
.day.weekend { background: #efe5d3; }
.day.weekend .day-num { color: var(--terracotta); }
.day.today { background: #fff1d9; }
.day.today .day-num { background: var(--amber); color: white; }
.day-num {
  display: inline-block; min-width: 22px; height: 22px; line-height: 22px;
  text-align: center; font-size: 12px; font-weight: 700; border-radius: 50%; margin-bottom: 4px;
  font-family: 'Manrope', sans-serif;
}

.event-pill {
  display: block; border-left: 3px solid var(--terracotta); background: #f5e7dc;
  padding: 5px 8px; border-radius: 5px; font-size: 11px; margin-bottom: 4px;
  cursor: pointer; transition: all .15s;
  white-space: normal;
  word-break: normal;
  overflow-wrap: break-word;
  hyphens: none;
  line-height: 1.35;
}
.event-pill:hover {
  background: white; box-shadow: 0 0 0 1px var(--terracotta), 0 4px 14px rgba(192,109,84,.18);
  transform: translateY(-1px);
}
.event-pill .time { color: var(--muted); margin-right: 4px; font-weight: 600; }
.event-pill .name { font-weight: 500; }

/* Категории — все в фирменной гамме (терракот / янтарный / оливковый) */
.event-pill.cat-mk      { border-left-color: var(--terracotta); background: #f5e7dc; }
.event-pill.cat-kino    { border-left-color: var(--dark); background: #ede8e1; }
.event-pill.cat-book    { border-left-color: var(--olive); background: #ebede0; }
.event-pill.cat-party   { border-left-color: var(--amber); background: #fdf0d6; }
.event-pill.cat-expert  { border-left-color: var(--olive-light); background: #eef0e5; }
.event-pill.cat-private { border-left-color: var(--muted); background: #ece6dd; opacity: .85; }

/* ================ СПИСОК ================ */
.list-view { display: none; }
.list-day {
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 14px 8px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.list-day.weekend { background: #efe5d3; }
.list-day.today { border-color: var(--amber); background: #fff1d9; }
.list-day-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}
.list-day-head .num {
  font-size: 24px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1;
  font-family: 'Manrope', sans-serif;
}
.list-day.weekend .list-day-head .num { color: var(--terracotta); }
.list-day-head .name {
  font-size: 14px;
  color: var(--muted);
  text-transform: lowercase;
  font-family: 'Onest', sans-serif;
}
.list-event {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-top: 1px solid var(--line);
  cursor: pointer;
  transition: background .12s;
  border-radius: 6px;
  margin: 0 -8px;
  padding-left: 8px;
  padding-right: 8px;
}
.list-event:first-child { border-top: none; }
.list-event:active { background: var(--bg); }
.list-event .time-col {
  flex-shrink: 0;
  width: 56px;
  font-weight: 700;
  color: var(--terracotta);
  font-size: 15px;
  font-family: 'Manrope', sans-serif;
  padding-top: 1px;
}
.list-event .body-col { flex: 1; min-width: 0; }
.list-event .ev-name {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 2px;
  line-height: 1.3;
  font-family: 'Manrope', sans-serif;
}
.list-event .ev-meta {
  color: var(--muted);
  font-size: 12px;
}
.list-event .ev-meta .price-tag {
  color: var(--amber-dark);
  font-weight: 700;
}
.list-event .arrow {
  color: var(--muted);
  font-size: 18px;
  align-self: center;
  flex-shrink: 0;
}
.list-event.private .ev-name { color: var(--muted); font-style: italic; }

/* ================ ТАБЛИЦА ================ */
.table-view { display: none; }
.events-table {
  width: 100%;
  background: white;
  border-radius: 10px;
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  overflow: hidden;
  border-collapse: collapse;
}
.events-table thead {
  background: var(--milk);
  border-bottom: 2px solid var(--line);
}
.events-table th {
  padding: 12px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .6px;
  font-family: 'Onest', sans-serif;
}
.events-table th.col-price, .events-table th.col-action { text-align: right; }
.events-table th.col-thumb { width: 72px; padding-left: 16px; padding-right: 0; }
.events-table tbody tr {
  border-bottom: 1px solid var(--line);
  transition: background .12s;
  cursor: pointer;
}
.events-table tbody tr:last-child { border-bottom: none; }
.events-table tbody tr:hover { background: var(--milk); }
.events-table tbody tr.weekend { background: #fdf6e8; }
.events-table tbody tr.weekend:hover { background: #f9eed8; }
.events-table tbody tr.today { background: #fff1d9; }
.events-table tbody tr.private { opacity: .7; }
.events-table tbody tr.private:hover { background: #efe5d3; }
.events-table td {
  padding: 14px 16px;
  font-size: 14px;
  vertical-align: middle;
  font-family: 'Onest', sans-serif;
}
.events-table .col-date {
  white-space: nowrap;
  font-family: 'Manrope', sans-serif;
  font-weight: 600;
}
.events-table .col-thumb-cell {
  padding-left: 16px;
  padding-right: 0;
  width: 72px;
}
.events-table .col-thumb-cell .thumb {
  width: 56px;
  height: 56px;
  border-radius: 8px;
  background-size: cover;
  background-position: center;
  background-color: var(--milk);
}
.events-table .col-thumb-cell .thumb.empty { background: transparent; }
.events-table .col-date .date-day { font-size: 16px; color: var(--dark); }
.events-table .col-date .date-wd { font-size: 11px; color: var(--muted); text-transform: lowercase; margin-left: 4px; }
.events-table .col-time {
  white-space: nowrap;
  font-weight: 600;
  color: var(--terracotta);
  font-family: 'Manrope', sans-serif;
}
.events-table .col-format {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  font-weight: 600;
  font-family: 'Onest', sans-serif;
  margin-bottom: 2px;
}
.events-table .col-name {
  font-weight: 600;
  color: var(--dark);
  font-family: 'Manrope', sans-serif;
}
.events-table tr.private .col-name { font-style: italic; color: var(--muted); }
.events-table .col-price {
  text-align: right;
  white-space: nowrap;
  color: var(--amber-dark);
  font-weight: 700;
  font-family: 'Manrope', sans-serif;
}
.events-table .col-price .em { color: var(--muted); font-weight: 400; font-style: italic; }
.events-table .col-action { text-align: right; white-space: nowrap; }
.events-table .col-action .btn-row {
  display: inline-block;
  background: var(--amber);
  color: white;
  font-family: 'Manrope', sans-serif;
  font-weight: 600;
  font-size: 12px;
  padding: 7px 14px;
  border-radius: 8px;
  text-decoration: none;
  white-space: nowrap;
  transition: background .15s;
}
.events-table .col-action .btn-row:hover { background: var(--amber-dark); }
.events-table .col-action .btn-row.olive { background: var(--olive); }
.events-table .col-action .btn-row.olive:hover { background: #5a6a3e; }

/* ================ ПЕРЕКЛЮЧАТЕЛЬ РЕЖИМОВ ================ */
.view-mode {
  display: inline-flex;
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.view-mode .mode-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 7px;
  cursor: pointer;
  font-family: 'Onest', sans-serif;
  text-transform: uppercase;
  letter-spacing: .5px;
  transition: all .15s;
}
.view-mode .mode-btn:hover { color: var(--dark); }
.view-mode .mode-btn.active {
  background: var(--terracotta);
  color: white;
}

/* Видимость режимов через класс на body */
body.view-mode-calendar .calendar { display: block; }
body.view-mode-calendar .list-view, body.view-mode-calendar .table-wrap { display: none; }
body.view-mode-list .list-view { display: block; }
body.view-mode-list .calendar, body.view-mode-list .table-wrap { display: none; }
body.view-mode-table .table-wrap { display: block; overflow-x: auto; }
body.view-mode-table .calendar, body.view-mode-table .list-view { display: none; }

.empty {
  padding: 80px 20px; text-align: center; color: var(--muted); font-size: 14px;
  grid-column: 1 / -1;
}
.empty .big { font-size: 40px; margin-bottom: 8px; opacity: 0.4; }

/* ================ МОДАЛКА КАРТОЧКИ ================ */
.modal-bg {
  position: fixed; inset: 0; background: rgba(40,30,20,.55);
  display: none; align-items: flex-start; justify-content: center;
  padding: 30px 16px; z-index: 100; overflow-y: auto;
}
.modal-bg.show { display: flex; }
.modal {
  background: white; border-radius: 14px; width: 100%; max-width: 560px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden;
  animation: slideIn .2s ease;
}
@keyframes slideIn {
  from { transform: translateY(-20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-banner {
  background: linear-gradient(135deg, var(--terracotta), var(--terracotta-dark));
  color: white; position: relative;
  overflow: hidden;
  display: flex;
  align-items: stretch;
  min-height: 200px;
}
.modal-banner.private { background: linear-gradient(135deg, var(--olive), var(--olive-light)); }
.modal-banner.private .banner-image { display: none; } /* у приватных нет картинки */

/* Левая колонка — вертикальная картинка референса 1:4 */
.banner-image {
  flex: 0 0 auto;
  width: 22%;        /* пропорция ~5:20 — узкая вертикальная полоса */
  min-width: 100px;
  max-width: 140px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-color: rgba(0,0,0,.15);
  align-self: stretch;
}
.banner-image.empty { display: none; } /* если нет референсов — прячем, баннер растягивается */

/* Правая колонка — текст шапки */
.banner-text {
  flex: 1 1 auto;
  padding: 26px 24px 22px;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.banner-text::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px; border-radius: 50%;
  background: rgba(255,255,255,.08);
  pointer-events: none;
}
.banner-text::after {
  content: ''; position: absolute; bottom: -60px; right: -30px;
  width: 100px; height: 100px; border-radius: 50%;
  background: rgba(255,255,255,.05);
  pointer-events: none;
}

.modal-banner .format-pill {
  display: inline-block; background: rgba(255,255,255,.22);
  padding: 4px 12px; border-radius: 16px; font-size: 11px; font-weight: 600;
  margin-bottom: 10px; text-transform: uppercase; letter-spacing: .8px;
  font-family: 'Onest', sans-serif;
  position: relative; z-index: 1;
  align-self: flex-start;
}
.modal-banner h2 {
  margin: 0 0 8px 0; font-weight: 500; line-height: 1.2;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 28px; letter-spacing: -.3px;
  font-style: italic;
  position: relative; z-index: 1;
}
.modal-banner .when {
  font-size: 14px; opacity: .95; position: relative; z-index: 1;
  font-family: 'Onest', sans-serif;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(0,0,0,.15); border: none; color: white;
  width: 32px; height: 32px; border-radius: 50%;
  font-size: 16px; cursor: pointer; line-height: 1;
  -webkit-appearance: none;
  appearance: none;
}
.modal-close:hover, .modal-close:active { background: rgba(0,0,0,.3); }
.modal-body { padding: 18px 22px; max-height: 50vh; overflow-y: auto; }
.detail-row { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; align-items: center; }
.detail-row .lbl { width: 110px; color: var(--muted); font-size: 12px; flex-shrink: 0; }
.detail-row .val { flex: 1; }
.detail-row .val.price {
  display: inline-block;
  background: linear-gradient(135deg, #fff5e0, #fdebbf);
  color: var(--amber-dark);
  font-weight: 800;
  font-size: 17px;
  padding: 5px 14px;
  border-radius: 8px;
  border: 1px solid #f5d99a;
  font-family: 'Manrope', sans-serif;
  letter-spacing: -.3px;
}
.descr {
  margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line);
  font-size: 13px; white-space: pre-line; line-height: 1.6; color: #444;
}
.private-message {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink);
  text-align: center;
  padding: 12px 6px 6px;
}
.private-message p { margin: 8px 0; }
.modal-foot {
  padding: 14px 22px; border-top: 1px solid var(--line);
  background: var(--bg); display: flex; gap: 8px;
}
.btn-book {
  flex: 1; background: var(--amber); color: white; border: none;
  padding: 14px 16px; font-size: 15px; font-weight: 700;
  border-radius: 10px; cursor: pointer; font-family: 'Manrope', sans-serif;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; text-decoration: none; letter-spacing: -.2px;
  transition: all .15s;
  -webkit-appearance: none;
  appearance: none;
}
.btn-book:hover, .btn-book:active { background: var(--amber-dark); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(239,159,39,.35); }
.btn-call {
  flex: 1; background: var(--olive); color: white; border: none;
  padding: 14px 16px; font-size: 14px; font-weight: 700;
  border-radius: 10px; cursor: pointer; font-family: 'Manrope', sans-serif;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; text-decoration: none; letter-spacing: -.2px;
  transition: all .15s;
  -webkit-appearance: none;
  appearance: none;
}
.btn-call:hover, .btn-call:active { background: #5a6840; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(107,122,74,.35); }
.btn-cancel {
  background: white; color: var(--ink); border: 1px solid var(--line);
  padding: 14px 16px; font-size: 14px; border-radius: 10px;
  cursor: pointer; font-family: 'Onest', sans-serif; font-weight: 500;
  -webkit-appearance: none;
  appearance: none;
}

/* ================ МОБИЛЬНАЯ АДАПТАЦИЯ ================ */
@media (max-width: 720px) {
  body { font-size: 15px; }

  header {
    padding: 16px 16px 14px;
  }
  header h1 { font-size: 24px; }
  header h1 em { font-size: 30px; }
  header h1 .small { font-size: 12px; }
  header .sub { font-size: 11px; }

  .month-nav { margin-top: 10px; gap: 6px; }
  .month-nav button {
    padding: 8px 14px;
    font-size: 14px;
    min-width: 44px;
    min-height: 36px;
  }
  .month-nav h2 { font-size: 15px; min-width: 130px; margin: 0 4px; }

  main { padding: 14px 12px 30px; }

  /* Таблица на мобиле — компактнее, скрываем неважные колонки */
  .events-table th, .events-table td { padding: 8px 6px; font-size: 13px; }
  .events-table th.col-thumb { padding-left: 10px; padding-right: 0; width: 56px; }
  .events-table .col-thumb-cell { padding-left: 10px; padding-right: 0; width: 56px; }
  .events-table .col-thumb-cell .thumb { width: 44px; height: 44px; border-radius: 6px; }
  .events-table .col-format { font-size: 10px; }
  .events-table .col-name { font-size: 13px; }
  .events-table .col-date { font-size: 13px; }
  .events-table .col-date .date-day { font-size: 13px; display: block; line-height: 1.2; }
  .events-table .col-date .date-wd { font-size: 10px; margin-left: 0; display: block; }
  .events-table .col-time { font-size: 13px; }
  /* Скрываем «Действие» — клик по строке всё равно открывает модалку с кнопкой */
  .events-table .col-action,
  .events-table th.col-action { display: none; }
  .view-mode { margin-bottom: 12px; }
  .view-mode .mode-btn { padding: 6px 10px; font-size: 11px; }

  /* Календарная плашка на мобиле — крупнее текст события, но все ещё переносится по словам */
  .event-pill { font-size: 11px; padding: 4px 6px; }

  /* Модалка на всю высоту экрана */
  .modal-bg { padding: 0; align-items: stretch; }
  .modal {
    max-width: 100%;
    border-radius: 0;
    /* min-height не ставим — пусть модалка растёт по контенту, иначе кнопка уходит вниз */
    display: flex;
    flex-direction: column;
  }
  .modal-banner { min-height: 160px; }
  .banner-image { width: 28%; min-width: 90px; max-width: 110px; }
  .banner-text { padding: 20px 16px 22px; }
  .modal-banner h2 { font-size: 22px; }
  .modal-banner .when { font-size: 13px; }
  .modal-close { top: 14px; right: 14px; width: 36px; height: 36px; }

  /* Body растёт по контенту, не флекс-расширяется на всю высоту */
  .modal-body { padding: 16px 18px; max-height: none; }
  .detail-row { padding: 8px 0; font-size: 14px; }
  .detail-row .lbl { width: 100px; font-size: 13px; }
  .detail-row .val.price { font-size: 17px; }
  .descr { font-size: 14px; line-height: 1.6; }
  .private-message { font-size: 16px; }

  .modal-foot {
    padding: 12px 14px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    position: sticky;
    bottom: 0;
  }
  .btn-cancel { padding: 14px 18px; }
  .btn-book, .btn-call { padding: 14px 18px; font-size: 15px; }
}

@media (max-width: 380px) {
  .list-event .time-col { width: 50px; font-size: 14px; }
  .list-event .ev-name { font-size: 14px; }
  .month-nav h2 { font-size: 14px; min-width: 110px; }
  .btn-call { font-size: 13px; }
}
</style>
</head>
<body class="view-mode-calendar">

<header>
  <h1>
    <span class="small">Расписание</span>
    <em>Детали</em>
  </h1>
  <div class="sub">Пространство событий и впечатлений · Могилёв</div>
  <div class="month-nav">
    <button onclick="prevMonth()" aria-label="Предыдущий месяц">‹</button>
    <h2 id="monthTitle">—</h2>
    <button onclick="nextMonth()" aria-label="Следующий месяц">›</button>
  </div>
</header>

<main>
  <div class="view-mode" role="tablist">
    <button class="mode-btn active" data-mode="calendar" onclick="setViewMode('calendar')">Календарь</button>
    <button class="mode-btn" data-mode="list" onclick="setViewMode('list')">Список</button>
    <button class="mode-btn" data-mode="table" onclick="setViewMode('table')">Таблица</button>
  </div>

  <!-- Календарная сетка -->
  <div class="calendar" id="calendarView">
    <div class="weekdays" id="weekdays"></div>
    <div class="days" id="daysGrid"><div class="empty"><div class="big">📅</div>Загрузка…</div></div>
  </div>

  <!-- Список по дням -->
  <div class="list-view" id="listView"></div>

  <!-- Таблица -->
  <div class="table-wrap" id="tableView"></div>
</main>

<div class="modal-bg" id="evModal">
  <div class="modal">
    <div class="modal-banner" id="mBanner">
      <div class="banner-image empty" id="mBannerImage"></div>
      <div class="banner-text">
        <button class="modal-close" onclick="closeModal()" aria-label="Закрыть">✕</button>
        <div class="format-pill" id="mFormat">—</div>
        <h2 id="mName">—</h2>
        <div class="when" id="mWhen">—</div>
      </div>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot" id="mFoot"></div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHrfjsxMyN2TGfAw-JH8MN0KW8QdUUy-bIQSlgjtEIciAw_FnbrL8ay5CrEcqrcQrF/exec';
const PROJECT = 'details';
// Контактный телефон для приватных мероприятий
const CONTACT_PHONE = '+375293151583';
const CONTACT_PHONE_DISPLAY = '+375 (29) 315-15-83';

const MONTH_NAMES = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const MONTH_NAMES_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const WEEKDAY_SHORT = ['пн','вт','ср','чт','пт','сб','вс'];
const WEEKDAY_LONG = ['понедельник','вторник','среда','четверг','пятница','суббота','воскресенье'];

const state = { curMonth: new Date(), events: [], loaded: false };

function ymd(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function categoryClass(fmt) {
  if (!fmt) return '';
  const f = String(fmt).toLowerCase();
  if (f.startsWith('мк') || f.indexOf('мастер-класс') >= 0) return 'cat-mk';
  if (fmt === 'Киновечер') return 'cat-kino';
  if (fmt === 'Книжный клуб') return 'cat-book';
  if (fmt === 'Вечеринка' || fmt === 'Дегустация' || fmt === 'Винная дегустация') return 'cat-party';
  if (fmt === 'Встреча с экспертом') return 'cat-expert';
  return '';
}

async function loadEvents() {
  if (APPS_SCRIPT_URL.includes('PUT_YOUR')) {
    document.getElementById('daysGrid').innerHTML = '<div class="empty"><div class="big">⚠</div>APPS_SCRIPT_URL не настроен в view.html</div>';
    return;
  }
  try {
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', 'publicEvents');
    url.searchParams.set('project', PROJECT);
    const r = await fetch(url.toString()).then(x => x.json());
    if (!r.ok) {
      document.getElementById('daysGrid').innerHTML = '<div class="empty"><div class="big">😕</div>' + escapeHtml(r.error || 'Не удалось загрузить расписание') + '</div>';
      return;
    }
    state.events = r.events || [];
    state.loaded = true;
    if (state.events.length > 0) {
      const today = ymd(new Date());
      const future = state.events.filter(e => e.date >= today);
      const first = future.length ? future[0] : state.events[0];
      const [y, m] = first.date.split('-').map(Number);
      state.curMonth = new Date(y, m - 1, 1);
    }
    render();
  } catch(e) {
    document.getElementById('daysGrid').innerHTML = '<div class="empty"><div class="big">😕</div>Не удалось связаться с сервером</div>';
  }
}

function render() {
  renderCalendar();
  renderList();
  renderTable();
}

function setViewMode(mode) {
  document.body.classList.remove('view-mode-calendar', 'view-mode-list', 'view-mode-table');
  document.body.classList.add('view-mode-' + mode);
  document.querySelectorAll('.view-mode .mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  try { localStorage.setItem('viewMode', mode); } catch(e) {}
}

// При загрузке восстанавливаем сохранённый режим. На мобиле дефолт — таблица.
(function initViewMode() {
  let saved = null;
  try { saved = localStorage.getItem('viewMode'); } catch(e) {}
  if (saved && ['calendar','list','table'].indexOf(saved) >= 0) {
    setViewMode(saved);
  } else if (window.matchMedia && window.matchMedia('(max-width: 720px)').matches) {
    setViewMode('table');
  }
})();

// Рендерит плашку события для десктопа. Учитывает приватные.
function renderEventPill(ev) {
  if (ev.isPrivate) {
    return `
      <div class="event-pill cat-private" onclick="openEvent('${ev.id}')">
        <span class="time">${escapeHtml(ev.timeStart || '')}</span><span class="name">Приватное мероприятие</span>
      </div>
    `;
  }
  const label = [ev.format, ev.name].filter(Boolean).join(' · ') || '?';
  return `
    <div class="event-pill ${categoryClass(ev.format)}" onclick="openEvent('${ev.id}')">
      <span class="time">${escapeHtml(ev.timeStart || '')}</span><span class="name">${escapeHtml(label)}</span>
    </div>
  `;
}

// === КАЛЕНДАРНАЯ СЕТКА (десктоп) ===
function renderCalendar() {
  const m = state.curMonth.getMonth();
  const y = state.curMonth.getFullYear();
  document.getElementById('monthTitle').textContent = MONTH_NAMES[m] + ' ' + y;

  const wd = document.getElementById('weekdays');
  wd.innerHTML = WEEKDAY_SHORT.map((d, i) => `<div class="${i >= 5 ? 'weekend' : ''}">${d}</div>`).join('');

  const first = new Date(y, m, 1);
  const startWd = (first.getDay() + 6) % 7;
  const start = new Date(y, m, 1 - startWd);
  const grid = document.getElementById('daysGrid');
  let html = '';
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dStr = ymd(d);
    const inMonth = d.getMonth() === m;
    const isToday = d.getTime() === today.getTime();
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const dayEvents = state.events.filter(e => e.date === dStr);
    dayEvents.sort((a, b) => (a.timeStart || '99').localeCompare(b.timeStart || '99'));
    const eventsHtml = dayEvents.map(renderEventPill).join('');
    html += `
      <div class="day ${inMonth ? '' : 'other-month'} ${isWe ? 'weekend' : ''} ${isToday ? 'today' : ''}">
        <span class="day-num">${d.getDate()}</span>
        ${eventsHtml}
      </div>
    `;
  }
  grid.innerHTML = html;
}

// === СПИСОК ПО ДНЯМ (мобильный) ===
function renderList() {
  const m = state.curMonth.getMonth();
  const y = state.curMonth.getFullYear();
  const monthEvents = state.events.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  });

  const container = document.getElementById('listView');

  if (monthEvents.length === 0) {
    container.innerHTML = '<div class="empty"><div class="big">📅</div>В этом месяце событий нет</div>';
    return;
  }

  // Группируем по дате
  const byDate = {};
  monthEvents.forEach(ev => {
    if (!byDate[ev.date]) byDate[ev.date] = [];
    byDate[ev.date].push(ev);
  });
  const dates = Object.keys(byDate).sort();
  const todayStr = ymd(new Date());

  let html = '';
  dates.forEach(dateStr => {
    const d = new Date(dateStr);
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const isToday = dateStr === todayStr;
    const dayEvents = byDate[dateStr].slice().sort((a, b) => (a.timeStart || '99').localeCompare(b.timeStart || '99'));

    const eventsHtml = dayEvents.map(ev => {
      if (ev.isPrivate) {
        return `
          <div class="list-event private" onclick="openEvent('${ev.id}')">
            <div class="time-col">${escapeHtml(ev.timeStart || '')}</div>
            <div class="body-col">
              <div class="ev-name">Приватное мероприятие</div>
              <div class="ev-meta">слот занят</div>
            </div>
            <div class="arrow">›</div>
          </div>
        `;
      }
      const label = [ev.format, ev.name].filter(Boolean).join(' · ') || '?';
      return `
        <div class="list-event" onclick="openEvent('${ev.id}')">
          <div class="time-col">${escapeHtml(ev.timeStart || '')}</div>
          <div class="body-col">
            <div class="ev-name">${escapeHtml(label)}</div>
            <div class="ev-meta">
              ${escapeHtml(ev.format || '')}${ev.price ? ' · <span class="price-tag">' + ev.price + ' руб</span>' : ''}
            </div>
          </div>
          <div class="arrow">›</div>
        </div>
      `;
    }).join('');

    html += `
      <div class="list-day ${isWe ? 'weekend' : ''} ${isToday ? 'today' : ''}">
        <div class="list-day-head">
          <div class="num">${d.getDate()}</div>
          <div class="name">${WEEKDAY_LONG[(wkd + 6) % 7]}, ${MONTH_NAMES_GEN[m]}</div>
        </div>
        ${eventsHtml}
      </div>
    `;
  });
  container.innerHTML = html;
}

// === ТАБЛИЦА ===
function renderTable() {
  const m = state.curMonth.getMonth();
  const y = state.curMonth.getFullYear();
  const monthEvents = state.events.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  }).slice().sort((a, b) =>
    (a.date + (a.timeStart || '99')).localeCompare(b.date + (b.timeStart || '99'))
  );

  const container = document.getElementById('tableView');
  if (monthEvents.length === 0) {
    container.innerHTML = '<div class="empty"><div class="big">📅</div>В этом месяце событий нет</div>';
    return;
  }

  const todayStr = ymd(new Date());

  const rows = monthEvents.map(ev => {
    const d = new Date(ev.date);
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const isToday = ev.date === todayStr;
    const wdShort = WEEKDAY_SHORT[(wkd + 6) % 7];

    const cls = [];
    if (isWe) cls.push('weekend');
    if (isToday) cls.push('today');
    if (ev.isPrivate) cls.push('private');

    if (ev.isPrivate) {
      return `
        <tr class="${cls.join(' ')}" onclick="openEvent('${ev.id}')">
          <td class="col-thumb-cell"><div class="thumb empty"></div></td>
          <td class="col-date"><span class="date-day">${d.getDate()} ${MONTH_NAMES_GEN[m]}</span><span class="date-wd">${wdShort}</span></td>
          <td class="col-time">${escapeHtml(ev.timeStart || '—')}</td>
          <td><div class="col-format">Приватное</div><div class="col-name">Слот занят</div></td>
          <td class="col-price"><span class="em">—</span></td>
          <td class="col-action"><a class="btn-row olive" href="tel:${CONTACT_PHONE}" onclick="event.stopPropagation()">Связаться</a></td>
        </tr>
      `;
    }

    const priceHtml = ev.price ? (ev.price + ' руб') : '<span class="em">по запросу</span>';
    const refs = (ev.references || []).filter(r => r && r.thumb);
    const thumbHtml = refs.length > 0
      ? `<div class="thumb" style="background-image: url('${refs[0].thumb.replace(/'/g, "%27")}')"></div>`
      : `<div class="thumb empty"></div>`;
    return `
      <tr class="${cls.join(' ')}" onclick="openEvent('${ev.id}')">
        <td class="col-thumb-cell">${thumbHtml}</td>
        <td class="col-date"><span class="date-day">${d.getDate()} ${MONTH_NAMES_GEN[m]}</span><span class="date-wd">${wdShort}</span></td>
        <td class="col-time">${escapeHtml(ev.timeStart || '—')}</td>
        <td>
          <div class="col-format">${escapeHtml(ev.format || '')}</div>
          <div class="col-name">${escapeHtml(ev.name || '')}</div>
        </td>
        <td class="col-price">${priceHtml}</td>
        <td class="col-action">
          <a class="btn-row" href="${escapeHtml(ev.formUrl || '#')}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Записаться</a>
        </td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <table class="events-table">
      <thead>
        <tr>
          <th class="col-thumb"></th>
          <th>Дата</th>
          <th>Время</th>
          <th>Событие</th>
          <th class="col-price">Цена</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function prevMonth() { state.curMonth = new Date(state.curMonth.getFullYear(), state.curMonth.getMonth() - 1, 1); render(); }
function nextMonth() { state.curMonth = new Date(state.curMonth.getFullYear(), state.curMonth.getMonth() + 1, 1); render(); }

function openEvent(id) {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  const dt = new Date(ev.date);
  const wd = WEEKDAY_LONG[(dt.getDay() + 6) % 7];
  const banner = document.getElementById('mBanner');
  const body = document.getElementById('mBody');
  const foot = document.getElementById('mFoot');

  banner.classList.toggle('private', !!ev.isPrivate);

  // Картинка референса слева — берём первый ref.thumb (для приватных всё равно скрыта через CSS)
  const bannerImage = document.getElementById('mBannerImage');
  if (bannerImage) {
    const refs = (ev.references || []).filter(r => r && r.thumb);
    if (refs.length > 0 && !ev.isPrivate) {
      const thumb = refs[0].thumb;
      bannerImage.style.backgroundImage = `url('${thumb.replace(/'/g, "%27")}')`;
      bannerImage.classList.remove('empty');
    } else {
      bannerImage.style.backgroundImage = '';
      bannerImage.classList.add('empty');
    }
  }

  if (ev.isPrivate) {
    // Заглушка для приватных (День рождения / Свидание / Частное мероприятие)
    document.getElementById('mFormat').textContent = 'Приватное мероприятие';
    document.getElementById('mName').textContent = 'Слот занят';
    document.getElementById('mWhen').textContent = `${dt.getDate()} ${MONTH_NAMES[dt.getMonth()]}, ${wd}, в ${ev.timeStart || '—'}`;
    body.innerHTML = `
      <div class="private-message">
        <p>В этот день у нас приватное мероприятие.</p>
        <p>Если хотите устроить такой же классный праздник в Деталях — свяжитесь с нами, и он будет великолепен!</p>
      </div>
    `;
    foot.innerHTML = `
      <button class="btn-cancel" onclick="closeModal()">Закрыть</button>
      <a class="btn-call" href="tel:${CONTACT_PHONE}">Связаться · ${escapeHtml(CONTACT_PHONE_DISPLAY)}</a>
    `;
  } else {
    // Обычное событие
    document.getElementById('mFormat').textContent = ev.format || '';
    const label = [ev.format, ev.name].filter(Boolean).join(' · ');
    document.getElementById('mName').textContent = label || ev.format || ev.name || '';
    document.getElementById('mWhen').textContent = `${dt.getDate()} ${MONTH_NAMES[dt.getMonth()]}, ${wd}, в ${ev.timeStart || '—'}`;
    const details = [];
    if (ev.duration) details.push(`<div class="detail-row"><div class="lbl">Длительность</div><div class="val">${ev.duration} ч</div></div>`);
    if (ev.price)    details.push(`<div class="detail-row"><div class="lbl">Цена</div><div class="val price">${ev.price} руб</div></div>`);
    if (ev.limit)    details.push(`<div class="detail-row"><div class="lbl">Мест</div><div class="val">до ${ev.limit}</div></div>`);
    body.innerHTML = `
      <div>${details.join('')}</div>
      <div class="descr">${escapeHtml(ev.description || '')}</div>
    `;
    foot.innerHTML = `
      <button class="btn-cancel" onclick="closeModal()">Закрыть</button>
      <a class="btn-book" href="${escapeHtml(ev.formUrl || '#')}" target="_blank" rel="noopener">Записаться</a>
    `;
  }

  document.getElementById('evModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('evModal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('evModal').addEventListener('click', e => {
  if (e.target.id === 'evModal') closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

loadEvents();
</script>
</body>
</html>
