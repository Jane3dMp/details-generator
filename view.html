<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Расписание · Детали</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* === ФИРМЕННЫЕ ЦВЕТА «ДЕТАЛИ» === */
  --terracotta: #C06D54;
  --terracotta-dark: #a35946;
  --amber: #EF9F27;
  --amber-dark: #d18510;
  --milk: #F5EFE6;
  --dark: #3D2B1F;
  --olive: #6B7A4A;
  --olive-light: #8FA370;

  /* Алиасы для совместимости со старой схемой */
  --bg: #F5EFE6;
  --card: #ffffff;
  --ink: #3D2B1F;
  --muted: #8a7d6e;
  --line: #e8dfd1;
  --accent: #C06D54;
  --accent-dark: #a35946;
  --green: #6B7A4A;
  --shadow: 0 1px 3px rgba(61,43,31,.04), 0 4px 12px rgba(61,43,31,.06);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: 'Onest', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
}

/* ================ ШАПКА ================ */
header {
  background: white;
  border-bottom: 1px solid var(--line);
  padding: 22px 20px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 5;
}
header h1 {
  margin: 0; font-weight: 700;
  font-family: 'Manrope', sans-serif;
  line-height: 1.05; letter-spacing: -.5px;
}
header h1 .small {
  font-size: 13px; color: var(--muted); display: block;
  font-family: 'Onest', sans-serif; font-weight: 500;
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px;
}
header h1 em {
  color: var(--terracotta); font-style: normal; font-weight: 800;
  font-size: 38px; letter-spacing: -1.2px;
}
header .sub { color: var(--muted); font-size: 12px; margin-top: 6px; letter-spacing: .3px; }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
.month-nav button {
  border: 1px solid var(--line); background: white; padding: 6px 14px;
  border-radius: 8px; cursor: pointer; font-family: 'Onest', sans-serif; font-size: 14px; color: var(--ink);
  transition: all .15s; font-weight: 500;
  -webkit-appearance: none;
  appearance: none;
}
.month-nav button:hover, .month-nav button:active { background: var(--bg); border-color: var(--terracotta); color: var(--terracotta); }
.month-nav h2 {
  margin: 0 12px; font-size: 18px; font-weight: 600; text-transform: capitalize;
  min-width: 160px; text-align: center;
  font-family: 'Manrope', sans-serif; letter-spacing: -.3px;
}

main { max-width: 1100px; margin: 0 auto; padding: 20px; }

/* ================ КАЛЕНДАРНАЯ СЕТКА (десктоп) ================ */
.calendar {
  background: white; border: 1px solid var(--line);
  border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);
}
.weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: var(--bg); border-bottom: 1px solid var(--line);
}
.weekdays > div {
  padding: 8px 12px; font-size: 11px; font-weight: 600;
  color: var(--muted); text-transform: uppercase; letter-spacing: .5px;
}
.weekdays > div.weekend { color: var(--terracotta); background: #efe5d3; }
.days { display: grid; grid-template-columns: repeat(7, 1fr); }
.day {
  min-height: 110px; padding: 6px;
  border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
  position: relative;
}
.day:nth-child(7n) { border-right: none; }
.day.other-month { background: #fafafa; opacity: .35; }
.day.weekend { background: #efe5d3; }
.day.weekend .day-num { color: var(--terracotta); }
.day.today { background: #fff1d9; }
.day.today .day-num { background: var(--amber); color: white; }
.day-num {
  display: inline-block; min-width: 22px; height: 22px; line-height: 22px;
  text-align: center; font-size: 12px; font-weight: 700; border-radius: 50%; margin-bottom: 4px;
  font-family: 'Manrope', sans-serif;
}

.event-pill {
  display: block; border-left: 3px solid var(--terracotta); background: #f5e7dc;
  padding: 5px 8px; border-radius: 5px; font-size: 11px; margin-bottom: 4px;
  cursor: pointer; transition: all .15s;
  white-space: normal;
  word-break: break-word;
  line-height: 1.35;
}
.event-pill:hover {
  background: white; box-shadow: 0 0 0 1px var(--terracotta), 0 4px 14px rgba(192,109,84,.18);
  transform: translateY(-1px);
}
.event-pill .ev-icon { font-size: 12px; margin-right: 3px; vertical-align: -1px; }
.event-pill .time { color: var(--muted); margin-right: 4px; font-weight: 600; }
.event-pill .name { font-weight: 500; }

/* Категории — все в фирменной гамме (терракот / янтарный / оливковый) */
.event-pill.cat-mk      { border-left-color: var(--terracotta); background: #f5e7dc; }
.event-pill.cat-kino    { border-left-color: var(--dark); background: #ede8e1; }
.event-pill.cat-book    { border-left-color: var(--olive); background: #ebede0; }
.event-pill.cat-party   { border-left-color: var(--amber); background: #fdf0d6; }
.event-pill.cat-expert  { border-left-color: var(--olive-light); background: #eef0e5; }
.event-pill.cat-private { border-left-color: var(--muted); background: #ece6dd; opacity: .85; }

/* ================ СПИСОК (мобильный) ================ */
.list-view { display: none; }
.list-day {
  background: white;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 14px 8px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.list-day.weekend { background: #efe5d3; }
.list-day.today { border-color: var(--amber); background: #fff1d9; }
.list-day-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}
.list-day-head .num {
  font-size: 24px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1;
  font-family: 'Manrope', sans-serif;
}
.list-day.weekend .list-day-head .num { color: var(--terracotta); }
.list-day-head .name {
  font-size: 14px;
  color: var(--muted);
  text-transform: lowercase;
  font-family: 'Onest', sans-serif;
}
.list-event {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-top: 1px solid var(--line);
  cursor: pointer;
  transition: background .12s;
  border-radius: 6px;
  margin: 0 -8px;
  padding-left: 8px;
  padding-right: 8px;
}
.list-event:first-child { border-top: none; }
.list-event:active { background: var(--bg); }
.list-event .time-col {
  flex-shrink: 0;
  width: 56px;
  font-weight: 700;
  color: var(--terracotta);
  font-size: 14px;
  font-family: 'Manrope', sans-serif;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding-top: 1px;
}
.list-event .time-col .list-icon {
  font-size: 22px; line-height: 1; margin-bottom: 2px;
}
.list-event .body-col { flex: 1; min-width: 0; }
.list-event .ev-name {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 2px;
  line-height: 1.3;
  font-family: 'Manrope', sans-serif;
}
.list-event .ev-meta {
  color: var(--muted);
  font-size: 12px;
}
.list-event .ev-meta .price-tag {
  color: var(--amber-dark);
  font-weight: 700;
}
.list-event .arrow {
  color: var(--muted);
  font-size: 18px;
  align-self: center;
  flex-shrink: 0;
}
.list-event.private .ev-name { color: var(--muted); font-style: italic; }

.empty {
  padding: 80px 20px; text-align: center; color: var(--muted); font-size: 14px;
  grid-column: 1 / -1;
}
.empty .big { font-size: 40px; margin-bottom: 8px; opacity: 0.4; }

/* ================ МОДАЛКА КАРТОЧКИ ================ */
.modal-bg {
  position: fixed; inset: 0; background: rgba(40,30,20,.55);
  display: none; align-items: flex-start; justify-content: center;
  padding: 30px 16px; z-index: 100; overflow-y: auto;
}
.modal-bg.show { display: flex; }
.modal {
  background: white; border-radius: 14px; width: 100%; max-width: 560px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden;
  animation: slideIn .2s ease;
}
@keyframes slideIn {
  from { transform: translateY(-20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-banner {
  background: linear-gradient(135deg, var(--terracotta), var(--terracotta-dark));
  color: white; padding: 26px 24px 22px; position: relative;
  overflow: hidden;
}
.modal-banner::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 140px; height: 140px; border-radius: 50%;
  background: rgba(255,255,255,.08);
  pointer-events: none;
}
.modal-banner::after {
  content: ''; position: absolute; bottom: -60px; left: -30px;
  width: 100px; height: 100px; border-radius: 50%;
  background: rgba(255,255,255,.05);
  pointer-events: none;
}
.modal-banner.private { background: linear-gradient(135deg, var(--olive), var(--olive-light)); }
.modal-banner .banner-icon {
  font-size: 40px; line-height: 1; margin-bottom: 12px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,.2));
  position: relative; z-index: 1;
}
.modal-banner .format-pill {
  display: inline-block; background: rgba(255,255,255,.22);
  padding: 4px 12px; border-radius: 16px; font-size: 11px; font-weight: 600;
  margin-bottom: 10px; text-transform: uppercase; letter-spacing: .8px;
  font-family: 'Onest', sans-serif;
  position: relative; z-index: 1;
}
.modal-banner h2 {
  margin: 0 0 8px 0; font-weight: 700; line-height: 1.2;
  font-family: 'Manrope', sans-serif;
  font-size: 24px; letter-spacing: -.4px;
  position: relative; z-index: 1;
}
.modal-banner .when {
  font-size: 14px; opacity: .95; position: relative; z-index: 1;
  font-family: 'Onest', sans-serif;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(0,0,0,.15); border: none; color: white;
  width: 32px; height: 32px; border-radius: 50%;
  font-size: 16px; cursor: pointer; line-height: 1;
  -webkit-appearance: none;
  appearance: none;
}
.modal-close:hover, .modal-close:active { background: rgba(0,0,0,.3); }
.modal-body { padding: 18px 22px; max-height: 50vh; overflow-y: auto; }
.detail-row { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; align-items: center; }
.detail-row .lbl { width: 110px; color: var(--muted); font-size: 12px; flex-shrink: 0; }
.detail-row .val { flex: 1; }
.detail-row .val.price {
  display: inline-block;
  background: linear-gradient(135deg, #fff5e0, #fdebbf);
  color: var(--amber-dark);
  font-weight: 800;
  font-size: 17px;
  padding: 5px 14px;
  border-radius: 8px;
  border: 1px solid #f5d99a;
  font-family: 'Manrope', sans-serif;
  letter-spacing: -.3px;
}
.descr {
  margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line);
  font-size: 13px; white-space: pre-line; line-height: 1.6; color: #444;
}
.private-message {
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink);
  text-align: center;
  padding: 8px 6px;
}
.private-message .emoji { font-size: 36px; margin-bottom: 10px; display: block; }
.private-message p { margin: 6px 0; }
.modal-foot {
  padding: 14px 22px; border-top: 1px solid var(--line);
  background: var(--bg); display: flex; gap: 8px;
}
.btn-book {
  flex: 1; background: var(--amber); color: white; border: none;
  padding: 14px 16px; font-size: 15px; font-weight: 700;
  border-radius: 10px; cursor: pointer; font-family: 'Manrope', sans-serif;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; text-decoration: none; letter-spacing: -.2px;
  transition: all .15s;
  -webkit-appearance: none;
  appearance: none;
}
.btn-book:hover, .btn-book:active { background: var(--amber-dark); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(239,159,39,.35); }
.btn-call {
  flex: 1; background: var(--olive); color: white; border: none;
  padding: 14px 16px; font-size: 14px; font-weight: 700;
  border-radius: 10px; cursor: pointer; font-family: 'Manrope', sans-serif;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; text-decoration: none; letter-spacing: -.2px;
  transition: all .15s;
  -webkit-appearance: none;
  appearance: none;
}
.btn-call:hover, .btn-call:active { background: #5a6840; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(107,122,74,.35); }
.btn-cancel {
  background: white; color: var(--ink); border: 1px solid var(--line);
  padding: 14px 16px; font-size: 14px; border-radius: 10px;
  cursor: pointer; font-family: 'Onest', sans-serif; font-weight: 500;
  -webkit-appearance: none;
  appearance: none;
}

/* ================ МОБИЛЬНАЯ АДАПТАЦИЯ ================ */
@media (max-width: 720px) {
  /* Скрываем календарь, показываем список */
  .calendar { display: none; }
  .list-view { display: block; }

  body { font-size: 15px; }

  header {
    padding: 16px 16px 14px;
  }
  header h1 { font-size: 24px; }
  header h1 em { font-size: 30px; }
  header h1 .small { font-size: 12px; }
  header .sub { font-size: 11px; }

  .month-nav { margin-top: 10px; gap: 6px; }
  .month-nav button {
    padding: 8px 14px;
    font-size: 14px;
    min-width: 44px;
    min-height: 36px;
  }
  .month-nav h2 { font-size: 15px; min-width: 130px; margin: 0 4px; }

  main { padding: 14px 12px 30px; }

  /* Модалка на всю высоту экрана */
  .modal-bg { padding: 0; align-items: stretch; }
  .modal {
    max-width: 100%;
    border-radius: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .modal-banner { padding: 22px 18px 24px; }
  .modal-banner h2 { font-size: 20px; }
  .modal-banner .when { font-size: 13px; }
  .modal-close { top: 14px; right: 14px; width: 36px; height: 36px; }

  .modal-body { padding: 16px 18px; max-height: none; flex: 1; }
  .detail-row { padding: 8px 0; font-size: 14px; }
  .detail-row .lbl { width: 100px; font-size: 13px; }
  .detail-row .val.price { font-size: 17px; }
  .descr { font-size: 14px; line-height: 1.6; }
  .private-message { font-size: 16px; }
  .private-message .emoji { font-size: 44px; }

  .modal-foot {
    padding: 12px 14px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    position: sticky;
    bottom: 0;
  }
  .btn-cancel { padding: 14px 18px; }
  .btn-book, .btn-call { padding: 14px 18px; font-size: 15px; }
}

@media (max-width: 380px) {
  .list-event .time-col { width: 50px; font-size: 14px; }
  .list-event .ev-name { font-size: 14px; }
  .month-nav h2 { font-size: 14px; min-width: 110px; }
  .btn-call { font-size: 13px; }
}
</style>
</head>
<body>

<header>
  <h1>
    <span class="small">Расписание</span>
    <em>Детали</em>
  </h1>
  <div class="sub">Клуб событий и впечатлений · Могилёв</div>
  <div class="month-nav">
    <button onclick="prevMonth()" aria-label="Предыдущий месяц">‹</button>
    <h2 id="monthTitle">—</h2>
    <button onclick="nextMonth()" aria-label="Следующий месяц">›</button>
  </div>
</header>

<main>
  <!-- Календарная сетка для десктопа -->
  <div class="calendar" id="calendarView">
    <div class="weekdays" id="weekdays"></div>
    <div class="days" id="daysGrid"><div class="empty"><div class="big">📅</div>Загрузка…</div></div>
  </div>

  <!-- Список по дням для мобильного -->
  <div class="list-view" id="listView"></div>
</main>

<div class="modal-bg" id="evModal">
  <div class="modal">
    <div class="modal-banner" id="mBanner">
      <button class="modal-close" onclick="closeModal()" aria-label="Закрыть">✕</button>
      <div class="banner-icon" id="mIcon">✨</div>
      <div class="format-pill" id="mFormat">—</div>
      <h2 id="mName">—</h2>
      <div class="when" id="mWhen">—</div>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-foot" id="mFoot"></div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyHrfjsxMyN2TGfAw-JH8MN0KW8QdUUy-bIQSlgjtEIciAw_FnbrL8ay5CrEcqrcQrF/exec';
const PROJECT = 'details';
// Контактный телефон для приватных мероприятий
const CONTACT_PHONE = '+375293151583';
const CONTACT_PHONE_DISPLAY = '+375 (29) 315-15-83';

const MONTH_NAMES = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const MONTH_NAMES_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const WEEKDAY_SHORT = ['пн','вт','ср','чт','пт','сб','вс'];
const WEEKDAY_LONG = ['понедельник','вторник','среда','четверг','пятница','суббота','воскресенье'];

const state = { curMonth: new Date(), events: [], loaded: false };

function ymd(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}
function categoryClass(fmt) {
  if (!fmt) return '';
  const f = String(fmt).toLowerCase();
  if (f.startsWith('мк') || f.indexOf('мастер-класс') >= 0) return 'cat-mk';
  if (fmt === 'Киновечер') return 'cat-kino';
  if (fmt === 'Книжный клуб') return 'cat-book';
  if (fmt === 'Вечеринка' || fmt === 'Дегустация' || fmt === 'Винная дегустация') return 'cat-party';
  if (fmt === 'Встреча с экспертом') return 'cat-expert';
  return '';
}

// Эмодзи-иконка по формату — для плашек и баннеров
function formatIcon(fmt) {
  if (!fmt) return '✨';
  const f = String(fmt).toLowerCase();
  if (f.indexOf('глин') >= 0)            return '🏺';
  if (f.indexOf('живопис') >= 0 || f.indexOf('рисован') >= 0) return '🎨';
  if (f.indexOf('макрам') >= 0 || f.indexOf('украшен') >= 0)  return '🧶';
  if (f.indexOf('бьюти') >= 0)           return '💄';
  if (f.indexOf('кулинар') >= 0)         return '👨‍🍳';
  if (f.indexOf('мастер-класс') >= 0 || f.startsWith('мк'))   return '✂️';
  if (f.indexOf('киновечер') >= 0)       return '🎬';
  if (f.indexOf('книжн') >= 0)           return '📚';
  if (f.indexOf('караоке') >= 0)         return '🎤';
  if (f.indexOf('винная') >= 0 || f.indexOf('дегустац') >= 0) return '🍷';
  if (f.indexOf('вечеринка') >= 0)       return '🎉';
  if (f.indexOf('встреча') >= 0)         return '💬';
  if (f.indexOf('настолки') >= 0)        return '🎲';
  if (f.indexOf('разговорник') >= 0)     return '🗣️';
  if (f.indexOf('свидание') >= 0)        return '🌹';
  if (f.indexOf('день рождени') >= 0)    return '🎂';
  return '✨';
}

async function loadEvents() {
  if (APPS_SCRIPT_URL.includes('PUT_YOUR')) {
    document.getElementById('daysGrid').innerHTML = '<div class="empty"><div class="big">⚠</div>APPS_SCRIPT_URL не настроен в view.html</div>';
    return;
  }
  try {
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', 'publicEvents');
    url.searchParams.set('project', PROJECT);
    const r = await fetch(url.toString()).then(x => x.json());
    if (!r.ok) {
      document.getElementById('daysGrid').innerHTML = '<div class="empty"><div class="big">😕</div>' + escapeHtml(r.error || 'Не удалось загрузить расписание') + '</div>';
      return;
    }
    state.events = r.events || [];
    state.loaded = true;
    if (state.events.length > 0) {
      const today = ymd(new Date());
      const future = state.events.filter(e => e.date >= today);
      const first = future.length ? future[0] : state.events[0];
      const [y, m] = first.date.split('-').map(Number);
      state.curMonth = new Date(y, m - 1, 1);
    }
    render();
  } catch(e) {
    document.getElementById('daysGrid').innerHTML = '<div class="empty"><div class="big">😕</div>Не удалось связаться с сервером</div>';
  }
}

function render() {
  renderCalendar();
  renderList();
}

// Рендерит плашку события для десктопа. Учитывает приватные.
function renderEventPill(ev) {
  if (ev.isPrivate) {
    return `
      <div class="event-pill cat-private" onclick="openEvent('${ev.id}')">
        <span class="ev-icon">🔒</span><span class="time">${escapeHtml(ev.timeStart || '')}</span><span class="name">Приватное мероприятие</span>
      </div>
    `;
  }
  const label = [ev.format, ev.name].filter(Boolean).join(' · ') || '?';
  return `
    <div class="event-pill ${categoryClass(ev.format)}" onclick="openEvent('${ev.id}')">
      <span class="ev-icon">${formatIcon(ev.format)}</span><span class="time">${escapeHtml(ev.timeStart || '')}</span><span class="name">${escapeHtml(label)}</span>
    </div>
  `;
}

// === КАЛЕНДАРНАЯ СЕТКА (десктоп) ===
function renderCalendar() {
  const m = state.curMonth.getMonth();
  const y = state.curMonth.getFullYear();
  document.getElementById('monthTitle').textContent = MONTH_NAMES[m] + ' ' + y;

  const wd = document.getElementById('weekdays');
  wd.innerHTML = WEEKDAY_SHORT.map((d, i) => `<div class="${i >= 5 ? 'weekend' : ''}">${d}</div>`).join('');

  const first = new Date(y, m, 1);
  const startWd = (first.getDay() + 6) % 7;
  const start = new Date(y, m, 1 - startWd);
  const grid = document.getElementById('daysGrid');
  let html = '';
  const today = new Date(); today.setHours(0,0,0,0);

  for (let i = 0; i < 42; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const dStr = ymd(d);
    const inMonth = d.getMonth() === m;
    const isToday = d.getTime() === today.getTime();
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const dayEvents = state.events.filter(e => e.date === dStr);
    dayEvents.sort((a, b) => (a.timeStart || '99').localeCompare(b.timeStart || '99'));
    const eventsHtml = dayEvents.map(renderEventPill).join('');
    html += `
      <div class="day ${inMonth ? '' : 'other-month'} ${isWe ? 'weekend' : ''} ${isToday ? 'today' : ''}">
        <span class="day-num">${d.getDate()}</span>
        ${eventsHtml}
      </div>
    `;
  }
  grid.innerHTML = html;
}

// === СПИСОК ПО ДНЯМ (мобильный) ===
function renderList() {
  const m = state.curMonth.getMonth();
  const y = state.curMonth.getFullYear();
  const monthEvents = state.events.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === m && d.getFullYear() === y;
  });

  const container = document.getElementById('listView');

  if (monthEvents.length === 0) {
    container.innerHTML = '<div class="empty"><div class="big">📅</div>В этом месяце событий нет</div>';
    return;
  }

  // Группируем по дате
  const byDate = {};
  monthEvents.forEach(ev => {
    if (!byDate[ev.date]) byDate[ev.date] = [];
    byDate[ev.date].push(ev);
  });
  const dates = Object.keys(byDate).sort();
  const todayStr = ymd(new Date());

  let html = '';
  dates.forEach(dateStr => {
    const d = new Date(dateStr);
    const wkd = d.getDay();
    const isWe = wkd === 0 || wkd === 6;
    const isToday = dateStr === todayStr;
    const dayEvents = byDate[dateStr].slice().sort((a, b) => (a.timeStart || '99').localeCompare(b.timeStart || '99'));

    const eventsHtml = dayEvents.map(ev => {
      if (ev.isPrivate) {
        return `
          <div class="list-event private" onclick="openEvent('${ev.id}')">
            <div class="time-col">
              <div class="list-icon">🔒</div>
              <div>${escapeHtml(ev.timeStart || '')}</div>
            </div>
            <div class="body-col">
              <div class="ev-name">Приватное мероприятие</div>
              <div class="ev-meta">слот занят</div>
            </div>
            <div class="arrow">›</div>
          </div>
        `;
      }
      const label = [ev.format, ev.name].filter(Boolean).join(' · ') || '?';
      return `
        <div class="list-event" onclick="openEvent('${ev.id}')">
          <div class="time-col">
            <div class="list-icon">${formatIcon(ev.format)}</div>
            <div>${escapeHtml(ev.timeStart || '')}</div>
          </div>
          <div class="body-col">
            <div class="ev-name">${escapeHtml(label)}</div>
            <div class="ev-meta">
              ${escapeHtml(ev.format || '')}${ev.price ? ' · <span class="price-tag">' + ev.price + ' руб</span>' : ''}
            </div>
          </div>
          <div class="arrow">›</div>
        </div>
      `;
    }).join('');

    html += `
      <div class="list-day ${isWe ? 'weekend' : ''} ${isToday ? 'today' : ''}">
        <div class="list-day-head">
          <div class="num">${d.getDate()}</div>
          <div class="name">${WEEKDAY_LONG[(wkd + 6) % 7]}, ${MONTH_NAMES_GEN[m]}</div>
        </div>
        ${eventsHtml}
      </div>
    `;
  });
  container.innerHTML = html;
}

function prevMonth() { state.curMonth = new Date(state.curMonth.getFullYear(), state.curMonth.getMonth() - 1, 1); render(); }
function nextMonth() { state.curMonth = new Date(state.curMonth.getFullYear(), state.curMonth.getMonth() + 1, 1); render(); }

function openEvent(id) {
  const ev = state.events.find(e => e.id === id);
  if (!ev) return;
  const dt = new Date(ev.date);
  const wd = WEEKDAY_LONG[(dt.getDay() + 6) % 7];
  const banner = document.getElementById('mBanner');
  const body = document.getElementById('mBody');
  const foot = document.getElementById('mFoot');

  banner.classList.toggle('private', !!ev.isPrivate);

  if (ev.isPrivate) {
    // Заглушка для приватных (День рождения / Свидание / Частное мероприятие)
    document.getElementById('mFormat').textContent = 'Приватное мероприятие';
    document.getElementById('mIcon').textContent = '🔒';
    document.getElementById('mName').textContent = 'Слот занят';
    document.getElementById('mWhen').textContent = `${dt.getDate()} ${MONTH_NAMES[dt.getMonth()]}, ${wd}, в ${ev.timeStart || '—'}`;
    body.innerHTML = `
      <div class="private-message">
        <span class="emoji">🎉</span>
        <p>В этот день у нас приватное мероприятие.</p>
        <p>Если хотите устроить такой же классный праздник в Деталях — свяжитесь с нами, и он будет великолепен!</p>
      </div>
    `;
    foot.innerHTML = `
      <button class="btn-cancel" onclick="closeModal()">Закрыть</button>
      <a class="btn-call" href="tel:${CONTACT_PHONE}">📞 Связаться · ${escapeHtml(CONTACT_PHONE_DISPLAY)}</a>
    `;
  } else {
    // Обычное событие
    document.getElementById('mFormat').textContent = ev.format || '';
    document.getElementById('mIcon').textContent = formatIcon(ev.format);
    const label = [ev.format, ev.name].filter(Boolean).join(' · ');
    document.getElementById('mName').textContent = label || ev.format || ev.name || '';
    document.getElementById('mWhen').textContent = `${dt.getDate()} ${MONTH_NAMES[dt.getMonth()]}, ${wd}, в ${ev.timeStart || '—'}`;
    const details = [];
    if (ev.duration) details.push(`<div class="detail-row"><div class="lbl">⏱ Длительность</div><div class="val">${ev.duration} ч</div></div>`);
    if (ev.price)    details.push(`<div class="detail-row"><div class="lbl">💰 Цена</div><div class="val price">${ev.price} руб</div></div>`);
    if (ev.limit)    details.push(`<div class="detail-row"><div class="lbl">👥 Мест</div><div class="val">до ${ev.limit}</div></div>`);
    body.innerHTML = `
      <div>${details.join('')}</div>
      <div class="descr">${escapeHtml(ev.description || '')}</div>
    `;
    foot.innerHTML = `
      <button class="btn-cancel" onclick="closeModal()">Закрыть</button>
      <a class="btn-book" href="${escapeHtml(ev.formUrl || '#')}" target="_blank" rel="noopener">📝 Записаться</a>
    `;
  }

  document.getElementById('evModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('evModal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('evModal').addEventListener('click', e => {
  if (e.target.id === 'evModal') closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

loadEvents();
</script>
</body>
</html>
